<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Commercial Plan — Livoltek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<style>
:root{
    --cor-azul:#2563eb; --cor-verde:#16a34a; --cor-laranja:#f59e0b; --cor-vermelho:#dc2626;
    --cinza-bg:#f5f6f8; --cinza-borda:#e5e7eb; --texto:#111827; --texto-suave:#6b7280;
    --sidebar-w:230px; --topbar-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--cinza-bg);color:var(--texto)}
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--cinza-borda);flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-header{height:var(--topbar-h);display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid var(--cinza-borda)}
.logo-dot{width:28px;height:28px;border-radius:7px;background:var(--cor-azul);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0}
.logo-text{font-weight:800;font-size:13px}
.nav-group{padding:10px}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--texto-suave);padding:10px 10px 4px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--texto);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.nav-item .ico{width:16px;text-align:center;flex-shrink:0}
.nav-item:hover{background:var(--cinza-bg)}
.nav-item.active{background:#eff6ff;color:var(--cor-azul);font-weight:700}
.nav-item.disabled{opacity:.5}
.main{flex:1;min-width:0}
.topbar{height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--cinza-borda);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:20}
.brand-mark{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--cor-azul);background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:3px 9px}
.page-title{font-size:15px;font-weight:700;margin-left:12px}
.content{padding:24px}
.tab-content{display:none}
.tab-content.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi-card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid var(--cor-azul)}
.kpi-card.verde{border-left-color:var(--cor-verde)} .kpi-card.laranja{border-left-color:var(--cor-laranja)} .kpi-card.vermelho{border-left-color:var(--cor-vermelho)}
.kpi-card.vazio{border-left-color:var(--cinza-borda)}
.kpi-card h4{font-size:10.5px;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:8px}
.kpi-card .valor{font-size:24px;font-weight:800;letter-spacing:-0.02em}
.kpi-card .valor.vazio{color:#cbd5e1;font-size:20px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:18px}
.card h3{font-size:14px;font-weight:700;margin-bottom:12px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters select{padding:7px 10px;border:1px solid var(--cinza-borda);border-radius:6px;font-size:12.5px;font-family:inherit}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#f8f8f8;padding:8px;text-align:left;border-bottom:2px solid var(--cinza-borda);font-weight:700;color:#555;white-space:nowrap;position:sticky;top:0}
td{padding:7px 8px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#fafafa}
.table-wrap{max-height:60vh;overflow:auto;border:1px solid var(--cinza-borda);border-radius:8px}
.empty{text-align:center;color:var(--texto-suave);padding:30px}
.loading{background:#fff3cd;border:1px solid #ffc107;padding:10px 14px;border-radius:6px;margin-bottom:16px;color:#856404;font-size:13px}
.placeholder-card{background:#fff;border:1.5px dashed var(--cinza-borda);border-radius:10px;padding:40px 24px;text-align:center;color:var(--texto-suave)}
.placeholder-card .ico-grande{font-size:32px;margin-bottom:12px}
.placeholder-card h3{color:var(--texto);font-size:16px;margin-bottom:6px}
.placeholder-card p{font-size:13px;max-width:420px;margin:0 auto}
</style>
</head>
<body>
<div class="shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="logo-dot">L</div><div class="logo-text">Commercial Plan</div></div>
        <nav class="nav-group" id="navMenu"></nav>
    </aside>
    <div class="main">
        <div class="topbar">
            <div class="brand-mark">SM Livoltek</div>
            <div class="page-title" id="pageTitle">Dashboard Executivo</div>
        </div>
        <div class="content" id="contentRoot"></div>
    </div>
</div>

<script src="pedidos-csv-service.js"></script>
<script>
const TABS = [
    { id:'executivo', ico:'📊', label:'Dashboard Executivo', ativo:true },
    { id:'plano', ico:'📋', label:'Plano Comercial', ativo:false },
    { id:'contratos', ico:'📄', label:'Contratos', ativo:false },
    { id:'pedidos', ico:'📦', label:'Pedidos', ativo:true },
    { id:'faturamento', ico:'💵', label:'Faturamento', ativo:true },
    { id:'estoque', ico:'🏭', label:'Estoque', ativo:false },
    { id:'importacoes', ico:'🚢', label:'Importações', ativo:false },
    { id:'produtos', ico:'🔧', label:'Produtos', ativo:false },
    { id:'diretorias', ico:'🏢', label:'Diretorias', ativo:false },
    { id:'alertas', ico:'🚨', label:'Alertas', ativo:false },
    { id:'config', ico:'⚙️', label:'Configurações', ativo:false },
];

let activeTab = 'executivo';
let todosPedidos = [];
let avisoValorInconsistente = [];

function buildNav(){
    document.getElementById('navMenu').innerHTML = TABS.map(tab => `
        <a class="nav-item ${tab.id===activeTab?'active':''} ${!tab.ativo?'disabled':''}" onclick="irPara('${tab.id}')">
            <span class="ico">${tab.ico}</span><span>${tab.label}</span>
        </a>`).join('');
}

function irPara(tabId){
    activeTab = tabId;
    buildNav();
    const tab = TABS.find(t => t.id === tabId);
    document.getElementById('pageTitle').textContent = tab.label;
    const root = document.getElementById('contentRoot');

    if (tabId === 'executivo') root.innerHTML = renderExecutivo();
    else if (tabId === 'pedidos') root.innerHTML = renderPedidos();
    else if (tabId === 'faturamento') root.innerHTML = renderFaturamento();
    else root.innerHTML = renderPlaceholder(tab.label);
}

function renderPlaceholder(nome){
    return `<div class="placeholder-card">
        <div class="ico-grande">🚧</div>
        <h3>${nome} ainda não tem fonte de dados</h3>
        <p>Assim que a planilha ou CSV desse módulo estiver definida, é só avisar que eu conecto aqui.</p>
    </div>`;
}

function fmt(n){ return (n||0).toLocaleString('pt-BR'); }
function fmtR$(n){ return 'R$ ' + (n||0).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function renderExecutivo(){
    const total = todosPedidos.length;
    const aguardando = todosPedidos.filter(p => p.status === 'PENDÊNCIA DO VENDEDOR').length;
    const analise = todosPedidos.filter(p => p.status === 'EM ANÁLISE (SM)').length;
    const faturados = todosPedidos.filter(p => p.status === 'ENVIADO PARA FATURAMENTO (PD)');
    const valorTotalPedidos = todosPedidos.reduce((a,p) => a + (p.valor||0), 0);
    const valorFaturado = faturados.reduce((a,p) => a + (p.valor||0), 0);

    return `
    <div class="kpi-grid">
        <div class="kpi-card vazio"><h4>Plano Comercial</h4><div class="valor vazio">Sem dados</div></div>
        <div class="kpi-card vazio"><h4>Contratos</h4><div class="valor vazio">Sem dados</div></div>
        <div class="kpi-card"><h4>Pedidos (valor)</h4><div class="valor">${fmtR$(valorTotalPedidos)}</div></div>
        <div class="kpi-card verde"><h4>Faturamento (valor)</h4><div class="valor">${fmtR$(valorFaturado)}</div></div>
        <div class="kpi-card vazio"><h4>Disponível em Estoque</h4><div class="valor vazio">Sem dados</div></div>
        <div class="kpi-card vazio"><h4>Backlog</h4><div class="valor vazio">Sem dados</div></div>
        <div class="kpi-card vazio"><h4>Forecast</h4><div class="valor vazio">Sem dados</div></div>
        <div class="kpi-card vazio"><h4>Cobertura de Estoque</h4><div class="valor vazio">Sem dados</div></div>
    </div>
    <div class="card"><h3>Pedidos por Diretoria (valor R$)</h3>
        <canvas id="chartStatus" style="max-height:280px"></canvas>
    </div>
    <div class="card"><h3>Diretoria → Vendedor (clique na diretoria pra abrir)</h3>
        <div id="tabelaDrillWrap"></div>
    </div>
    <div class="placeholder-card">
        <div class="ico-grande">📋</div>
        <h3>Comparativo Mensal, Forecast e Funil Comercial</h3>
        <p>Dependem do Plano Comercial e Contratos — ainda sem fonte definida. Assim que tiver o CSV, eu ligo esses gráficos.</p>
    </div>`;
}

function renderDrillDiretoriaVendedor(){
    const el = document.getElementById('tabelaDrillWrap');
    if (!el) return;

    const porDiretoria = {};
    todosPedidos.forEach(p => {
        const d = p.diretoria || 'Não mapeado';
        porDiretoria[d] = porDiretoria[d] || { pedidos:0, faturado:0, vendedores:{} };
        porDiretoria[d].pedidos += (p.valor||0);
        if (p.status === 'ENVIADO PARA FATURAMENTO (PD)') porDiretoria[d].faturado += (p.valor||0);

        const v = p.kam || 'Não informado';
        porDiretoria[d].vendedores[v] = porDiretoria[d].vendedores[v] || { pedidos:0, faturado:0 };
        porDiretoria[d].vendedores[v].pedidos += (p.valor||0);
        if (p.status === 'ENVIADO PARA FATURAMENTO (PD)') porDiretoria[d].vendedores[v].faturado += (p.valor||0);
    });

    const diretorias = Object.entries(porDiretoria).sort((a,b) => b[1].pedidos - a[1].pedidos);
    let html = '<div class="table-wrap"><table><tr><th></th><th>Directorate</th><th>Orders (value)</th><th>Invoiced (value)</th></tr>';
    diretorias.forEach(([dir, d], idx) => {
        html += `<tr class="linha-diretoria" style="cursor:pointer" onclick="toggleDrill(${idx})">
            <td>▸</td><td><strong>${dir}</strong></td><td>${fmtR$(d.pedidos)}</td><td>${fmtR$(d.faturado)}</td>
        </tr>`;
        const vendedores = Object.entries(d.vendedores).sort((a,b) => b[1].pedidos - a[1].pedidos);
        html += `<tr id="drill_${idx}" style="display:none"><td colspan="4" style="padding:0">
            <table style="width:100%;background:#fafafa"><tr>
                <th style="padding-left:32px">Salesperson</th><th>Orders (value)</th><th>Invoiced (value)</th></tr>`;
        vendedores.forEach(([v, d2]) => {
            html += `<tr><td style="padding-left:32px">${v}</td><td>${fmtR$(d2.pedidos)}</td><td>${fmtR$(d2.faturado)}</td></tr>`;
        });
        html += `</table></td></tr>`;
    });
    html += '</table></div>';
    el.innerHTML = html;
}

function toggleDrill(idx){
    const row = document.getElementById('drill_'+idx);
    if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
}

function desenharChartExecutivo(){
    const ctx = document.getElementById('chartStatus');
    if (!ctx) return;
    const porDiretoria = {};
    todosPedidos.forEach(p => { const k = p.diretoria||'Não mapeado'; porDiretoria[k] = (porDiretoria[k]||0) + (p.valor||0); });
    const ordenado = Object.entries(porDiretoria).sort((a,b) => b[1]-a[1]);
    if (window.chartStatusInstance) window.chartStatusInstance.destroy();
    window.chartStatusInstance = new Chart(ctx, {
        type:'bar',
        data:{ labels:ordenado.map(o=>o[0]), datasets:[{ data:ordenado.map(o=>o[1]), backgroundColor:'#2563eb', borderRadius:6 }] },
        options:{ indexAxis:'y', responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false},
            tooltip:{callbacks:{label:(item)=>fmtR$(item.parsed.x)}}},
            scales:{x:{ticks:{callback:(v)=>fmtR$(v)}}} }
    });
}

function renderPedidos(){
    if (todosPedidos.length === 0) return '<div class="loading">⏳ Carregando pedidos.csv...</div>';
    return `
    <div class="filters">
        <select id="filtroDiretoria" onchange="renderTabelaPedidos()"><option value="">Diretoria: Todas</option></select>
        <select id="filtroStatus" onchange="renderTabelaPedidos()">
            <option value="">Status: Todos</option>
            <option value="PENDÊNCIA DO VENDEDOR">Aguardando Vendedor</option>
            <option value="EM ANÁLISE (SM)">Em Análise (SM)</option>
            <option value="ENVIADO PARA FATURAMENTO (PD)">Enviado para Faturamento</option>
        </select>
    </div>
    <div class="kpi-grid">
        <div class="kpi-card"><h4>Total (valor)</h4><div class="valor">${fmtR$(todosPedidos.reduce((a,p)=>a+(p.valor||0),0))}</div></div>
        <div class="kpi-card vermelho"><h4>Aguardando Vendedor</h4><div class="valor">${fmtR$(todosPedidos.filter(p=>p.status==='PENDÊNCIA DO VENDEDOR').reduce((a,p)=>a+(p.valor||0),0))}</div></div>
        <div class="kpi-card laranja"><h4>Em Análise (SM)</h4><div class="valor">${fmtR$(todosPedidos.filter(p=>p.status==='EM ANÁLISE (SM)').reduce((a,p)=>a+(p.valor||0),0))}</div></div>
        <div class="kpi-card verde"><h4>Enviado p/ Faturamento</h4><div class="valor">${fmtR$(todosPedidos.filter(p=>p.status==='ENVIADO PARA FATURAMENTO (PD)').reduce((a,p)=>a+(p.valor||0),0))}</div></div>
    </div>
    <div class="card"><h3>Registros</h3><div id="tabelaPedidosWrap"></div></div>`;
}

function renderTabelaPedidos(){
    const dir = document.getElementById('filtroDiretoria')?.value || '';
    const status = document.getElementById('filtroStatus')?.value || '';
    const filtrados = todosPedidos.filter(p => (!dir || p.diretoria===dir) && (!status || p.status===status));
    const el = document.getElementById('tabelaPedidosWrap');
    if (!el) return;
    if (filtrados.length === 0){ el.innerHTML = '<div class="empty">Nenhum pedido encontrado.</div>'; return; }
    let html = '<div class="table-wrap"><table><tr>' +
        ['Diretoria','KAM','Nº Pedido','Cliente','Valor','Recebido','Completo','Envio Fat.','Status'].map(h=>`<th>${h}</th>`).join('') + '</tr>';
    filtrados.forEach(p => {
        const cor = p.status==='PENDÊNCIA DO VENDEDOR'?'#dc2626':p.status==='EM ANÁLISE (SM)'?'#f59e0b':'#16a34a';
        html += `<tr>
            <td>${p.diretoria||'-'}</td><td>${p.kam||'-'}</td><td><strong>${p.po}</strong></td>
            <td>${p.cliente||'-'}</td><td>${fmtR$(p.valor)}</td><td>${p.dataReceb||'-'}</td><td>${p.dataCompl||'-'}</td><td>${p.dataEnvio||'-'}</td>
            <td><span style="color:${cor};font-weight:600">${p.status||'-'}</span></td>
        </tr>`;
    });
    html += '</table></div>';
    el.innerHTML = html;
}

function mesDoEnvio(dataEnvioStr){
    if (!dataEnvioStr) return null;
    const partes = dataEnvioStr.split('/');
    return partes.length === 3 ? parseInt(partes[1]) : null;
}
function anoDoEnvio(dataEnvioStr){
    if (!dataEnvioStr) return null;
    const partes = dataEnvioStr.split('/');
    return partes.length === 3 ? parseInt(partes[2]) : null;
}
const NOMES_MES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderFaturamento(){
    if (todosPedidos.length === 0) return '<div class="loading">⏳ Loading pedidos.csv...</div>';
    const faturados = todosPedidos.filter(p => p.status === 'ENVIADO PARA FATURAMENTO (PD)');
    if (faturados.length === 0) return '<div class="empty">No invoiced orders found in pedidos.csv yet.</div>';

    let aviso = '';
    if (avisoValorInconsistente && avisoValorInconsistente.length){
        aviso = `<div class="placeholder-card" style="border-color:#dc2626;text-align:left;padding:16px 20px;margin-bottom:16px">
            <strong style="color:#dc2626">⚠ Atenção:</strong> ${avisoValorInconsistente.length} pedido(s) têm valor diferente entre linhas do CSV
            (ex: ${avisoValorInconsistente.slice(0,5).join(', ')}). Isso pode significar que a coluna de valor é por
            <em>produto</em>, não por <em>pedido total</em> — o que faria os totais abaixo ficarem menores do que o real.
            Confirma comigo o nome exato da coluna pra eu ajustar se precisar somar em vez de pegar só a 1ª linha.
        </div>`;
    }

    const diretorias = window.__diretoriasCache || [];
    const vendedores = window.__vendedoresCache || [];

    return `
    ${aviso}
    <div class="filters">
        <select id="fatAno" onchange="renderTabelaFaturamento()"></select>
        <select id="fatMes" onchange="renderTabelaFaturamento()">
            <option value="">Month: All (YTD accumulated)</option>
            ${NOMES_MES.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('')}
        </select>
        <select id="fatDiretoria" onchange="renderTabelaFaturamento()">
            <option value="">Directorate: All</option>
            ${diretorias.map(d=>`<option value="${d}">${d}</option>`).join('')}
        </select>
        <select id="fatVendedor" onchange="renderTabelaFaturamento()">
            <option value="">Salesperson: All</option>
            ${vendedores.map(v=>`<option value="${v}">${v}</option>`).join('')}
        </select>
    </div>
    <div class="kpi-grid" id="fatKpis"></div>
    <div class="card"><h3>Invoiced Value by Month (selected filters)</h3><canvas id="chartFatMes" style="max-height:280px"></canvas></div>
    <div class="card"><h3>Invoiced Value by Directorate</h3><canvas id="chartFatDir" style="max-height:280px"></canvas></div>
    <div class="card"><h3>Invoiced Value by Client</h3><div id="tabelaClienteWrap"></div></div>
    <div class="card"><h3>Order-level Records</h3><div id="tabelaFatWrap"></div></div>`;
}

function popularFiltroAno(){
    const sel = document.getElementById('fatAno');
    if (!sel || sel.options.length) return;
    const anos = [...new Set(todosPedidos.map(p=>anoDoEnvio(p.dataEnvio)).filter(Boolean))].sort((a,b)=>b-a);
    sel.innerHTML = anos.map(a=>`<option value="${a}">${a}</option>`).join('');
}

function renderTabelaFaturamento(){
    popularFiltroAno();
    const ano = Number(document.getElementById('fatAno')?.value) || new Date().getFullYear();
    const mes = document.getElementById('fatMes')?.value || '';
    const dir = document.getElementById('fatDiretoria')?.value || '';
    const vend = document.getElementById('fatVendedor')?.value || '';

    let faturados = todosPedidos.filter(p => p.status === 'ENVIADO PARA FATURAMENTO (PD)' && anoDoEnvio(p.dataEnvio) === ano);
    if (mes) faturados = faturados.filter(p => mesDoEnvio(p.dataEnvio) === Number(mes));
    if (dir) faturados = faturados.filter(p => p.diretoria === dir);
    if (vend) faturados = faturados.filter(p => p.kam === vend);

    const valorTotal = faturados.reduce((a,p)=>a+(p.valor||0),0);
    const modo = mes ? `${NOMES_MES[mes-1]}/${ano}` : `Accumulated ${ano}`;

    document.getElementById('fatKpis').innerHTML = `
        <div class="kpi-card verde"><h4>Invoiced — ${modo}</h4><div class="valor">${fmtR$(valorTotal)}</div></div>
        <div class="kpi-card"><h4>Orders</h4><div class="valor">${fmt(faturados.length)}</div></div>
        <div class="kpi-card laranja"><h4>Avg. Ticket</h4><div class="valor">${fmtR$(faturados.length ? valorTotal/faturados.length : 0)}</div></div>`;

    // Gráfico mensal — sempre mostra os 12 meses do ano selecionado (com ou sem filtro de mês),
    // pra você enxergar Junho no contexto do ano, não isolado.
    const baseAno = todosPedidos.filter(p => p.status === 'ENVIADO PARA FATURAMENTO (PD)' && anoDoEnvio(p.dataEnvio) === ano
        && (!dir || p.diretoria===dir) && (!vend || p.kam===vend));
    const porMes = {};
    NOMES_MES.forEach(m => porMes[m] = 0);
    baseAno.forEach(p => { const m = mesDoEnvio(p.dataEnvio); if (m) porMes[NOMES_MES[m-1]] += (p.valor||0); });
    if (window.chartFatMesInstance) window.chartFatMesInstance.destroy();
    window.chartFatMesInstance = new Chart(document.getElementById('chartFatMes'), {
        type:'bar',
        data:{ labels:Object.keys(porMes), datasets:[{ data:Object.values(porMes), backgroundColor:'#16a34a', borderRadius:6 }] },
        options:{ responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false},
            tooltip:{callbacks:{label:(item)=>fmtR$(item.parsed.y)}}}, scales:{y:{ticks:{callback:(v)=>fmtR$(v)}}} }
    });

    const porDir = {};
    faturados.forEach(p => { porDir[p.diretoria] = (porDir[p.diretoria]||0)+(p.valor||0); });
    if (window.chartFatDirInstance) window.chartFatDirInstance.destroy();
    window.chartFatDirInstance = new Chart(document.getElementById('chartFatDir'), {
        type:'bar',
        data:{ labels:Object.keys(porDir), datasets:[{ data:Object.values(porDir), backgroundColor:'#2563eb', borderRadius:6 }] },
        options:{ indexAxis:'y', responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false},
            tooltip:{callbacks:{label:(item)=>fmtR$(item.parsed.x)}}}, scales:{x:{ticks:{callback:(v)=>fmtR$(v)}}} }
    });

    // Faturamento por cliente (agrupado — resposta direta à pergunta "total por cliente, não por produto")
    const porCliente = {};
    faturados.forEach(p => {
        const c = p.cliente || 'Not informed';
        porCliente[c] = porCliente[c] || { valor:0, pedidos:0 };
        porCliente[c].valor += (p.valor||0);
        porCliente[c].pedidos += 1;
    });
    const clientesOrdenados = Object.entries(porCliente).sort((a,b) => b[1].valor - a[1].valor);
    let htmlCli = '<div class="table-wrap"><table><tr><th>Client</th><th>Orders</th><th>Total Value</th></tr>';
    clientesOrdenados.forEach(([cli, d]) => {
        htmlCli += `<tr><td>${cli}</td><td>${fmt(d.pedidos)}</td><td>${fmtR$(d.valor)}</td></tr>`;
    });
    htmlCli += '</table></div>';
    document.getElementById('tabelaClienteWrap').innerHTML = clientesOrdenados.length ? htmlCli : '<div class="empty">No records.</div>';

    // Detalhe por pedido
    let html = '<div class="table-wrap"><table><tr>' +
        ['Directorate','Salesperson','Order #','Client','Value','Invoice Date'].map(h=>`<th>${h}</th>`).join('') + '</tr>';
    [...faturados].sort((a,b) => new Date(anoDoEnvio(b.dataEnvio), mesDoEnvio(b.dataEnvio)-1) - new Date(anoDoEnvio(a.dataEnvio), mesDoEnvio(a.dataEnvio)-1))
        .forEach(p => {
            html += `<tr><td>${p.diretoria||'-'}</td><td>${p.kam||'-'}</td><td><strong>${p.po}</strong></td><td>${p.cliente||'-'}</td><td>${fmtR$(p.valor)}</td><td>${p.dataEnvio||'-'}</td></tr>`;
        });
    html += '</table></div>';
    document.getElementById('tabelaFatWrap').innerHTML = html;
}

async function init(){
    buildNav();
    irPara('executivo');
    try {
        const resultado = await carregarPedidos();
        todosPedidos = resultado.pedidos;
        avisoValorInconsistente = resultado.avisoValorInconsistente;
        const diretorias = [...new Set(todosPedidos.map(p=>p.diretoria).filter(Boolean))].sort();
        window.__diretoriasCache = diretorias;
        window.__vendedoresCache = [...new Set(todosPedidos.map(p=>p.kam).filter(Boolean))].sort();
        irPara(activeTab);
    } catch (err) {
        console.error(err);
    }
}

// Ao entrar em Pedidos, popula o filtro de diretoria e desenha a tabela
const _irParaOriginal = irPara;
irPara = function(tabId){
    _irParaOriginal(tabId);
    if (tabId === 'pedidos' && todosPedidos.length){
        const sel = document.getElementById('filtroDiretoria');
        if (sel && sel.options.length <= 1 && window.__diretoriasCache){
            window.__diretoriasCache.forEach(d => sel.innerHTML += `<option value="${d}">${d}</option>`);
        }
        renderTabelaPedidos();
    }
    if (tabId === 'executivo' && todosPedidos.length) setTimeout(() => { desenharChartExecutivo(); renderDrillDiretoriaVendedor(); }, 50);
    if (tabId === 'faturamento' && todosPedidos.length) setTimeout(renderTabelaFaturamento, 50);
};

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
