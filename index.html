<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stock Dashboard — Livoltek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<style>
:root{
    --cor-azul:#2563eb; --cor-verde:#16a34a; --cor-laranja:#f59e0b; --cor-vermelho:#dc2626;
    --cor-chumbo:#4b5563; --cinza-bg:#f5f6f8; --cinza-borda:#e5e7eb; --texto:#111827; --texto-suave:#6b7280;
    --sidebar-w:230px; --topbar-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--cinza-bg);color:var(--texto)}
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--cinza-borda);flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-header{height:var(--topbar-h);display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid var(--cinza-borda)}
.logo-dot{width:28px;height:28px;border-radius:7px;background:var(--cor-azul);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0}
.logo-text{font-weight:800;font-size:13.5px}
.nav-group{padding:12px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--texto);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.nav-item .ico{width:16px;text-align:center;flex-shrink:0}
.nav-item:hover{background:var(--cinza-bg)}
.nav-item.active{background:#eff6ff;color:var(--cor-azul);font-weight:700}
.main{flex:1;min-width:0}
.topbar{height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--cinza-borda);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}
.brand-mark{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--cor-azul);background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:3px 9px}
.page-title{font-size:15px;font-weight:700;margin-left:12px}
.lang-btn{background:#fff;border:1px solid var(--cinza-borda);border-radius:6px;padding:7px 12px;font-size:12.5px;cursor:pointer}
.content{padding:24px}
.tab-content{display:none}
.tab-content.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi-card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid var(--cor-azul)}
.kpi-card.verde{border-left-color:var(--cor-verde)} .kpi-card.laranja{border-left-color:var(--cor-laranja)} .kpi-card.vermelho{border-left-color:var(--cor-vermelho)}
.kpi-card h4{font-size:10.5px;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:8px}
.kpi-card .valor{font-size:24px;font-weight:800;letter-spacing:-0.02em}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:18px}
.card h3{font-size:14px;font-weight:700;margin-bottom:12px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters select,.filters input{padding:7px 10px;border:1px solid var(--cinza-borda);border-radius:6px;font-size:12.5px;font-family:inherit}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#f8f8f8;padding:8px;text-align:left;border-bottom:2px solid var(--cinza-borda);font-weight:700;color:#555;white-space:nowrap;position:sticky;top:0}
td{padding:7px 8px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#fafafa}
.table-wrap{max-height:60vh;overflow:auto;border:1px solid var(--cinza-borda);border-radius:8px}
.badge-armz{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px;color:#fff;white-space:nowrap}
.badge-armz.chumbo{background:var(--cor-chumbo)} .badge-armz.azul{background:var(--cor-azul)}
.mp-section{margin-top:18px;border:1.5px solid var(--cor-vermelho);border-radius:8px;padding:14px;background:#fef2f2}
.mp-section h4{color:var(--cor-vermelho);font-size:12.5px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.03em}
.neg{color:var(--cor-vermelho);font-weight:700}
.pos{color:var(--cor-verde)}
.empty{text-align:center;color:var(--texto-suave);padding:30px}
.loading{background:#fff3cd;border:1px solid #ffc107;padding:10px 14px;border-radius:6px;margin-bottom:16px;color:#856404;font-size:13px}
.legenda{display:flex;gap:16px;margin-bottom:16px;font-size:12px;color:var(--texto-suave)}
.legenda span{display:inline-flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.divergencia{background:#fef2f2;border:1px solid #fecaca;color:var(--cor-vermelho);padding:12px 14px;border-radius:8px;font-size:12.5px;margin-bottom:16px}
@media(max-width:900px){.sidebar{position:fixed;z-index:100;transform:translateX(-100%)}.sidebar.mobile-open{transform:translateX(0)}}
</style>
</head>
<body>
<div class="shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="logo-dot">L</div><div class="logo-text">Livoltek Stock</div></div>
        <nav class="nav-group" id="navMenu"></nav>
    </aside>
    <div class="main">
        <div class="topbar">
            <div style="display:flex;align-items:center">
                <div class="brand-mark">SM Livoltek</div>
                <div class="page-title" id="pageTitle">Dashboard</div>
            </div>
        </div>
        <div class="content">
            <div id="loadingMsg" class="loading">⏳ Loading ESTOQUE.csv, RESERVAS.csv and CONFERENCIA.csv...</div>
            <div id="tabsRoot" style="display:none"></div>
        </div>
    </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIGURAÇÃO
// ══════════════════════════════════════════════════════════════
const CSV_URLS = { estoque:'data/ESTOQUE.csv', reservas:'data/RESERVAS.csv', conferencia:'data/CONFERENCIA.csv' };

const TABS = [
    { id:'dashboard', ico:'📊', label:'Dashboard' },
    { id:'todos', ico:'📦', label:'All Products' },
    { id:'inversores', ico:'⚡', label:'Inverters', familia:'INVERSOR' },
    { id:'carregadores', ico:'🔌', label:'EV Chargers', familia:'CARREGADOR' },
    { id:'bess', ico:'🔋', label:'Batteries', familia:'BATERIABESS' },
    { id:'kitsolar', ico:'☀️', label:'Solar Kit', familia:'KITSOLAR' },
    { id:'stringbox', ico:'🧰', label:'String Box', familia:'STRINGBOX' },
    { id:'diversos', ico:'🔧', label:'Others', familia:'DIVERSOS' },
    { id:'reservas', ico:'📋', label:'Bookings' },
    { id:'oportunidades', ico:'💡', label:'Insights' },
    { id:'auditoria', ico:'🔍', label:'AUDIT' },
];
function t(tab){ return tab.label; }

// ══════════════════════════════════════════════════════════════
// LEITURA E DECODIFICAÇÃO (windows-1252 — nunca resp.text())
// ══════════════════════════════════════════════════════════════
function fetchTextoLatin1(url){
    return fetch(url).then(r => { if(!r.ok) throw new Error(`HTTP ${r.status} em ${url}`); return r.arrayBuffer(); })
        .then(buf => new TextDecoder('windows-1252').decode(buf));
}
// Parser de linha CSV que respeita aspas — necessário porque a Descrição às vezes
// contém ';' dentro de aspas (ex: '"FUSIVEL ... ;SEV-43F-250/1000;DC;250.0A..."'),
// e um split(';') ingênuo desalinha todas as colunas daquela linha (causa raiz de
// saldos absurdos tipo 3.013.500.620 — o próprio código virando "saldo").
function splitCSVLinha(linha, sep){
    const campos = [];
    let atual = '';
    let dentroAspas = false;
    for (let i = 0; i < linha.length; i++){
        const ch = linha[i];
        if (ch === '"'){ dentroAspas = !dentroAspas; continue; }
        if (ch === sep && !dentroAspas){ campos.push(atual); atual = ''; continue; }
        atual += ch;
    }
    campos.push(atual);
    return campos;
}

function parseCSV(text){
    const linhas = text.trim().split('\n').filter(l => l.trim());
    return linhas.slice(1).map(l => splitCSVLinha(l, ';').map(c => (c||'').trim()));
}

// ══════════════════════════════════════════════════════════════
// NORMALIZAÇÃO — remove acento/espaço/caixa, evita bugs de comparação
// (causa raiz do bug de MP não aparecer: categoria vinha com acento/
// espaço variável do CSV e a comparação exata falhava)
// ══════════════════════════════════════════════════════════════
function norm(s){
    return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'').toUpperCase();
}
function isMP(categoria){
    const n = norm(categoria);
    return n === 'MATERIAPRIMA';
}
function familiaTab(familiaRaw){
    const n = norm(familiaRaw);
    const found = TABS.find(t => t.familia && n.includes(t.familia));
    return found ? found.id : 'diversos';
}
function armazemCor(nome){
    return norm(nome).includes('FABRICA') ? 'azul' : 'chumbo';
}

// ══════════════════════════════════════════════════════════════
// CARREGAMENTO DOS DADOS
// ══════════════════════════════════════════════════════════════
let estoqueRows = [], reservasRows = [], conferenciaRows = [];
let activeTab = 'dashboard';

async function carregarTudo(){
    try {
        const [txtE, txtR, txtC] = await Promise.all([
            fetchTextoLatin1(CSV_URLS.estoque),
            fetchTextoLatin1(CSV_URLS.reservas),
            fetchTextoLatin1(CSV_URLS.conferencia),
        ]);

        estoqueRows = parseCSV(txtE).filter(r => r[0]).map(r => ({
            codigo: r[0], tp: r[1], descricao: r[3], fl: r[5], armz: r[6],
            saldo: parseFloat(r[7]) || 0, empenho: parseFloat(r[8]) || 0, disponivel: parseFloat(r[9]) || 0,
            armazemDashboard: r[14], categoria: r[15], familia: r[16], nomenclatura: r[17] || r[3],
            reservaAplicada: 0, virtual: false
        }));

        reservasRows = parseCSV(txtR).filter(r => r[3] && !r[7]).map(r => ({
            cliente:r[0], responsavel:r[1], diretoria:r[2], codigo:r[3], observacoes:r[4],
            armazem:r[5], qtdade: parseFloat(r[6]) || 0, cancelado:r[7], solicitado:r[8]
        }));

        conferenciaRows = parseCSV(txtC);

        aplicarReservas();
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('tabsRoot').style.display = 'block';
        buildNav();
        renderTab('dashboard');
    } catch(err){
        console.error(err);
        document.getElementById('loadingMsg').innerHTML = `⚠️ Error loading data: ${err.message}`;
    }
}

// Aplica reservas ao estoque (DISPONÍVEL = SALDO − RESERVA), com guarda por
// (codigo+armazem) pra não aplicar a mesma reserva mais de uma vez caso haja
// linhas duplicadas, e cria linha virtual quando a reserva não bate com
// nenhum item do estoque (divergência a ser mostrada na Auditoria).
function aplicarReservas(){
    const index = {};
    estoqueRows.forEach(row => {
        const key = norm(row.codigo) + '|' + norm(row.armazemDashboard);
        index[key] = index[key] || [];
        index[key].push(row);
    });

    reservasRows.forEach(res => {
        const key = norm(res.codigo) + '|' + norm(res.armazem);
        const alvos = index[key];
        if (alvos && alvos.length){
            alvos[0].reservaAplicada += res.qtdade;
        } else {
            const virtual = {
                codigo: res.codigo, tp:'', descricao:'(sem produto no estoque)', fl:'', armz:'',
                saldo:0, empenho:0, disponivel: -res.qtdade, armazemDashboard: res.armazem || 'Não informado',
                categoria:'', familia:'DIVERSOS', nomenclatura:'(sem produto no estoque)',
                reservaAplicada: res.qtdade, virtual: true
            };
            estoqueRows.push(virtual);
            index[key] = [virtual];
        }
    });

    estoqueRows.forEach(row => { row.disponivelFinal = row.disponivel - row.reservaAplicada; });
}

// ══════════════════════════════════════════════════════════════
// NAVEGAÇÃO
// ══════════════════════════════════════════════════════════════
function buildNav(){
    const nav = document.getElementById('navMenu');
    nav.innerHTML = TABS.map(tab =>
        `<a class="nav-item ${tab.id===activeTab?'active':''}" onclick="renderTab('${tab.id}')">
            <span class="ico">${tab.ico}</span><span>${t(tab)}</span>
        </a>`
    ).join('');
}

function renderTab(tabId){
    activeTab = tabId;
    buildNav();
    const tab = TABS.find(x => x.id === tabId);
    document.getElementById('pageTitle').textContent = t(tab);
    const root = document.getElementById('tabsRoot');

    if (tabId === 'dashboard') root.innerHTML = renderDashboard();
    else if (tabId === 'todos') root.innerHTML = renderTabelaProdutos(estoqueRows, 'todos');
    else if (tabId === 'reservas') root.innerHTML = renderReservas();
    else if (tabId === 'oportunidades') root.innerHTML = renderOportunidades();
    else if (tabId === 'auditoria') root.innerHTML = renderAuditoria();
    else root.innerHTML = renderFamilia(tab);

    setTimeout(() => { if (tabId === 'dashboard') desenharGraficosDashboard(); }, 50);
}

// ══════════════════════════════════════════════════════════════
// RENDERERS
// ══════════════════════════════════════════════════════════════
function fmt(n){ return (n||0).toLocaleString('pt-BR'); }

function renderDashboard(){
    const totalSaldo = estoqueRows.reduce((a,r) => a + r.saldo, 0);
    const totalReserva = reservasRows.reduce((a,r) => a + r.qtdade, 0);
    const totalDisponivel = estoqueRows.reduce((a,r) => a + r.disponivelFinal, 0);
    const skus = new Set(estoqueRows.map(r => norm(r.codigo))).size;
    const emSeparacao = estoqueRows.reduce((a,r) => a + (r.empenho||0), 0);

    return `
    <div class="kpi-grid">
        <div class="kpi-card"><h4>Total Stock</h4><div class="valor">${fmt(totalSaldo)}</div></div>
        <div class="kpi-card laranja"><h4>Total Bookings</h4><div class="valor">${fmt(totalReserva)}</div></div>
        <div class="kpi-card vermelho"><h4>In Picking</h4><div class="valor">${fmt(emSeparacao)}</div></div>
        <div class="kpi-card verde"><h4>Available</h4><div class="valor">${fmt(totalDisponivel)}</div></div>
        <div class="kpi-card"><h4>Records</h4><div class="valor">${fmt(estoqueRows.length)}</div></div>
        <div class="kpi-card"><h4>Unique SKUs</h4><div class="valor">${fmt(skus)}</div></div>
    </div>
    <div class="legenda">
        <span><span class="dot" style="background:var(--cor-chumbo)"></span>Curitiba / Fortaleza / Manaus (Eletra)</span>
        <span><span class="dot" style="background:var(--cor-azul)"></span>Fábrica Livoltek</span>
    </div>
    <div class="card"><h3>Stock by Warehouse</h3><canvas id="chartArmazem" style="max-height:280px"></canvas></div>
    <div class="card"><h3>Stock by Family</h3><canvas id="chartFamilia" style="max-height:280px"></canvas></div>`;
}

function desenharGraficosDashboard(){
    const porArmz = {};
    estoqueRows.forEach(r => { porArmz[r.armazemDashboard] = (porArmz[r.armazemDashboard]||0) + r.saldo; });
    const ctxA = document.getElementById('chartArmazem');
    if (ctxA){
        if (window.chartArmzInstance) window.chartArmzInstance.destroy();
        window.chartArmzInstance = new Chart(ctxA, {
            type:'bar',
            data:{ labels:Object.keys(porArmz), datasets:[{ data:Object.values(porArmz),
                backgroundColor: Object.keys(porArmz).map(k => armazemCor(k)==='azul' ? '#2563eb' : '#4b5563'), borderRadius:6 }] },
            options:{ indexAxis:'y', responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false}} }
        });
    }
    const porFam = {};
    estoqueRows.forEach(r => { const f = t(TABS.find(x=>x.id===familiaTab(r.familia))); porFam[f] = (porFam[f]||0) + r.saldo; });
    const ctxF = document.getElementById('chartFamilia');
    if (ctxF){
        if (window.chartFamInstance) window.chartFamInstance.destroy();
        window.chartFamInstance = new Chart(ctxF, {
            type:'bar',
            data:{ labels:Object.keys(porFam), datasets:[{ data:Object.values(porFam), backgroundColor:'#2563eb', borderRadius:6 }] },
            options:{ indexAxis:'y', responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false}} }
        });
    }
}

function renderFamilia(tab){
    const rows = estoqueRows.filter(r => familiaTab(r.familia) === tab.id && !isMP(r.categoria));
    const mpRows = estoqueRows.filter(r => familiaTab(r.familia) === tab.id && isMP(r.categoria));
    let html = renderTabelaProdutos(rows, tab.id);
    if (mpRows.length){
        html += `<div class="mp-section"><h4>⚠ Raw Material (validation section)</h4>${renderTabelaProdutos(mpRows, tab.id+'_mp', true)}</div>`;
    }
    return html;
}

function renderTabelaProdutos(rows, prefix, compact){
    if (rows.length === 0) return `<div class="empty">No items found.</div>`;
    const cols = ['Code','Name','Warehouse','Balance','Committed','Available (TOTVS)','Applied Booking','Final Available'];
    let html = `<div class="filters"><input type="text" placeholder="Search code or name..." oninput="filtrarTabela('${prefix}', this.value)"></div>`;
    html += `<div class="table-wrap"><table id="tbl_${prefix}"><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
    rows.forEach(r => {
        const cor = armazemCor(r.armazemDashboard);
        const negativo = r.disponivelFinal < 0;
        html += `<tr data-busca="${(r.codigo+' '+r.nomenclatura).toLowerCase()}">
            <td><strong>${r.codigo}</strong>${r.virtual?' ⚠':''}</td>
            <td>${r.nomenclatura}</td>
            <td><span class="badge-armz ${cor}">${r.armazemDashboard}</span></td>
            <td>${fmt(r.saldo)}</td>
            <td>${fmt(r.empenho)}</td>
            <td>${fmt(r.disponivel)}</td>
            <td>${r.reservaAplicada ? fmt(r.reservaAplicada) : '-'}</td>
            <td class="${negativo?'neg':'pos'}">${fmt(r.disponivelFinal)}</td>
        </tr>`;
    });
    html += '</table></div>';
    return html;
}

function filtrarTabela(prefix, termo){
    const tbl = document.getElementById('tbl_'+prefix);
    if (!tbl) return;
    const q = termo.toLowerCase();
    Array.from(tbl.rows).slice(1).forEach(tr => {
        tr.style.display = tr.dataset.busca.includes(q) ? '' : 'none';
    });
}

function renderReservas(){
    if (reservasRows.length === 0) return `<div class="empty">No active bookings.</div>`;
    const cols = ['Client','Owner','Directorate','Code','Warehouse','Qty','Notes'];
    let html = `<div class="table-wrap"><table><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
    reservasRows.forEach(r => {
        html += `<tr>
            <td>${r.cliente||'-'}</td><td>${r.responsavel||'-'}</td><td>${r.diretoria||'-'}</td>
            <td><strong>${r.codigo}</strong></td><td>${r.armazem||'-'}</td><td>${fmt(r.qtdade)}</td>
            <td style="max-width:220px">${r.observacoes||'-'}</td>
        </tr>`;
    });
    html += '</table></div>';
    return html;
}

function renderOportunidades(){
    const criticos = estoqueRows.filter(r => r.disponivelFinal < 0).sort((a,b) => a.disponivelFinal - b.disponivelFinal);
    const topEstoque = [...estoqueRows].sort((a,b) => b.saldo - a.saldo).slice(0, 10);
    let html = `<div class="card"><h3>⚠ Items with Negative Availability (booking &gt; stock)</h3>`;
    html += criticos.length ? renderTabelaProdutos(criticos, 'oport_neg', true) : `<div class="empty">No critical items.</div>`;
    html += `</div><div class="card"><h3>Top 10 Highest Stock Balance</h3>`;
    html += renderTabelaProdutos(topEstoque, 'oport_top', true);
    html += `</div>`;
    return html;
}

function renderAuditoria(){
    const totalSaldo = estoqueRows.reduce((a,r) => a + r.saldo, 0);
    const totalDisponivel = estoqueRows.reduce((a,r) => a + r.disponivelFinal, 0);
    const totalReserva = reservasRows.reduce((a,r) => a + r.qtdade, 0);
    const skus = new Set(estoqueRows.map(r => norm(r.codigo))).size;
    const virtuais = estoqueRows.filter(r => r.virtual);

    let html = `<div class="kpi-grid">
        <div class="kpi-card"><h4>Total Stock (calculated)</h4><div class="valor">${fmt(totalSaldo)}</div></div>
        <div class="kpi-card laranja"><h4>Total Bookings (calculated)</h4><div class="valor">${fmt(totalReserva)}</div></div>
        <div class="kpi-card verde"><h4>Available (calculated)</h4><div class="valor">${fmt(totalDisponivel)}</div></div>
        <div class="kpi-card"><h4>Unique SKUs</h4><div class="valor">${fmt(skus)}</div></div>
    </div>`;

    if (virtuais.length){
        html += `<div class="divergencia">⚠ ${virtuais.length} booking(s) with no matching stock item (virtual row created, negative availability): `
            + virtuais.map(v => `${v.codigo} (${v.armazemDashboard}, ${fmt(-v.disponivelFinal)} un.)`).join(' · ') + `</div>`;
    }

    html += `<div class="card"><h3>CONFERENCIA.csv (reference values from last processing run)</h3>`;
    html += `<div class="table-wrap"><table><tr><th>Indicador</th><th>Valor</th></tr>`;
    conferenciaRows.forEach(r => { html += `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`; });
    html += `</table></div></div>`;
    return html;
}

document.addEventListener('DOMContentLoaded', () => {
    buildNav(); // menu aparece sempre, mesmo que o carregamento dos CSVs falhe
    carregarTudo();
});
</script>
</body>
